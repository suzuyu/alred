description_rules:
  # regex には remote_host と remote_if の名前付きキャプチャを含める
  #
  # 解析イメージ:
  # local interface の running-config に以下の description があるとする
  #   description lfsw0102 Ethernet1/49
  # この場合は以下として解釈される
  #   remote_host = lfsw0102
  #   remote_if   = Ethernet1/49
  #
  # normalize-links 実行時には概ね以下の片方向リンク候補になる
  #   src_node = <local hostname>
  #   src_if   = <description が付いていた local interface>
  #   dst_node = lfsw0102
  #   dst_if   = Ethernet1/49
  #   protocol = description
  #
  - name: hostname_interface_space
    # 例:
    #   description lfsw0102 Ethernet1/49
    #   description lfsw0102_Ethernet1/49
    #   description BGRT0101 Po10
    regex: '(?P<remote_host>[A-Za-z0-9._-]+)[ _:-]+(?P<remote_if>(?:Eth|eth|Ethernet|Po|po|Port-channel)\S*)'

  - name: to_hostname_interface
    # 例:
    #   description TO_lfsw0102_Ethernet1/49
    #   description to bgrt0101 Po10
    regex: 'TO[_ -]?(?P<remote_host>[A-Za-z0-9._-]+)[_ -]+(?P<remote_if>(?:Eth|eth|Ethernet|Po|po|Port-channel)\S*)'
