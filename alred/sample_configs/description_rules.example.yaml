description_rules:
  # regex には remote_host の名前付きキャプチャを含める
  # remote_if は任意。ホスト名のみの description を扱う場合は省略できる
  #
  # 解析イメージ:
  # local interface の running-config に以下の description があるとする
  #   description lfsw0102 Ethernet1/49
  # この場合は以下として解釈される
  #   remote_host = lfsw0102
  #   remote_if   = Ethernet1/49
  #
  # normalize-links 実行時には概ね以下の片方向リンク候補になる
  #   src_node = <local hostname>
  #   src_if   = <description が付いていた local interface>
  #   dst_node = lfsw0102
  #   dst_if   = Ethernet1/49
  #   protocol = description
  #
  # host 名のみの場合:
  #   description lfsw0102
  # は以下として解釈される
  #   remote_host = lfsw0102
  #   remote_if   = ""
  #
  - name: to_hostname_interface
    # 例:
    #   description TO_lfsw0102_Ethernet1/49
    #   description to bgrt0101 Po10
    #   description to accesssw01 Gi1/0/1
    #   description tenant1-server01 ens2
    regex: 'TO[_ -]?(?P<remote_host>[A-Za-z0-9._-]+)[_ -]+(?P<remote_if>(?:Eth|eth|Ethernet|Fa|fa|FastEthernet|Gi|gi|GigabitEthernet|Te|te|TenGigabitEthernet|Po|po|Port-channel|ens|enp|eno|bond|br|IPMI|ipmi|BMC|bmc|IBMC|ibmc|LAN|lan)\S*)'

  - name: hostname_interface_space
    # 例:
    #   description lfsw0102 Ethernet1/49
    #   description lfsw0102_Ethernet1/49
    #   description BGRT0101 Po10
    #   description accesssw01 Gi1/0/1
    #   description distsw01 Te1/1
    #   description tenant1-server01 ens2
    regex: '(?P<remote_host>[A-Za-z0-9._-]+)[ _:-]+(?P<remote_if>(?:Eth|eth|Ethernet|Fa|fa|FastEthernet|Gi|gi|GigabitEthernet|Te|te|TenGigabitEthernet|Po|po|Port-channel|ens|enp|eno|bond|br|IPMI|ipmi|BMC|bmc|IBMC|ibmc|LAN|lan)\S*)'

  - name: hostname_only
    # 例:
    #   description lfsw0102
    regex: '^(?P<remote_host>[A-Za-z0-9._-]+)$'
